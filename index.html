<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026 Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f0b429;
      --dark: #0a0e1a;
      --card: #111827;
      --card2: #1a2236;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: #8892a4;
      --green: #10b981;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0d1b2e 0%, #1a2d50 50%, #0d1b2e 100%);
      border-bottom: 2px solid var(--gold);
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .trophy-icon { font-size: 36px; }

    .header-title h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .header-title p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .live-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse-dot 1.2s infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── DATE NAV ── */
    .date-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .date-nav::-webkit-scrollbar { display: none; }

    .date-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .date-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .date-btn.active {
      background: var(--gold);
      color: #0a0e1a;
      border-color: var(--gold);
    }

    .date-btn.today-btn {
      border-color: var(--green);
      color: var(--green);
    }

    .date-btn.today-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    /* ── MAIN ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── TODAY HERO ── */
    .today-hero {
      background: linear-gradient(135deg, #0f2027 0%, #1a3a4a 50%, #0f2027 100%);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .today-hero-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .today-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
    }

    .today-date-str {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
    }

    .next-up-card {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .next-up-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .next-up-teams {
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
    }

    .next-up-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .countdown-box {
      margin-left: auto;
      text-align: center;
      min-width: 90px;
    }

    .countdown-num {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── MATCH CARD ── */
    .matches-list { display: flex; flex-direction: column; gap: 10px; }

    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }

    .match-card:hover {
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .match-card.next-match {
      border-color: rgba(240, 180, 41, 0.4);
      background: linear-gradient(135deg, #1a1505 0%, #1a1a0d 100%);
    }

    .match-card.live {
      border-color: rgba(239, 68, 68, 0.5);
      background: linear-gradient(135deg, #1a0505 0%, #1a0a0a 100%);
    }

    .match-card.completed {
      opacity: 0.65;
    }

    .team-block { display: flex; flex-direction: column; gap: 4px; }
    .team-block.right { text-align: right; align-items: flex-end; }

    .team-flag { font-size: 1.8rem; line-height: 1; }
    .team-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .team-abbr { font-size: 0.7rem; color: var(--muted); font-weight: 600; }

    .match-center { text-align: center; }

    .match-time {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
    }

    .match-time.live-time { color: var(--red); }

    .match-score {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--gold);
    }

    .match-group {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .match-venue {
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .match-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .badge-live { background: rgba(239,68,68,0.2); color: var(--red); }
    .badge-next { background: rgba(240,180,41,0.2); color: var(--gold); }
    .badge-done { background: rgba(255,255,255,0.07); color: var(--muted); }
    .badge-ko   { background: rgba(59,130,246,0.2); color: var(--blue); }

    /* ── ROUND HEADER ── */
    .round-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0 12px;
    }

    .round-pill {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 50px;
    }

    .round-pill.gold { background: linear-gradient(135deg, #7a4a00, #f0b429); color: #1a0f00; }
    .round-pill.red  { background: linear-gradient(135deg, #7a0000, #ef4444); }

    /* ── NO MATCHES ── */
    .no-matches {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .no-matches-icon { font-size: 48px; margin-bottom: 12px; }
    .no-matches h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .header-title h1 { font-size: 1.2rem; }
      .match-card { padding: 12px 14px; gap: 8px; }
      .team-flag { font-size: 1.5rem; }
      .team-name { font-size: 0.8rem; }
      .today-hero { padding: 16px; }
    }
  </style>
</head>

//  STAGE COLORS / LABELS

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function todayStr() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function nowET() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
}

function matchDatetimeET(dateStr, timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const [y, mo, d] = dateStr.split('-').map(Number);
  return new Date(`${dateStr}T${timeStr}:00-04:00`);
}

function formatFriendlyDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function fmtCountdown(ms) {
  if (ms <= 0) return { h:0, m:0, s:0 };
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const min = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return { h, m: min, s };
}

function formatTime12(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm} ET`;
}

// ════════════════════════════════════════════════════════
//  GET UNIQUE DATES
// ════════════════════════════════════════════════════════
const allDates = [...new Set(SCHEDULE.map(m => m.date))].sort();
const TODAY = todayStr();

// ════════════════════════════════════════════════════════
//  MATCH STATUS
// ════════════════════════════════════════════════════════
function getMatchStatus(m) {
  const start = matchDatetimeET(m.date, m.time);
  const end = new Date(start.getTime() + 110 * 60000); // 90min + extras
  const now = new Date();
  if (now > end) return 'done';
  if (now >= start) return 'live';
  return 'upcoming';
}

// ════════════════════════════════════════════════════════
//  RENDER DATE NAV
// ════════════════════════════════════════════════════════
let selectedDate = allDates.includes(TODAY) ? TODAY : allDates[0];

function renderDateNav() {
  const nav = document.getElementById('date-nav');
  nav.innerHTML = '';

  // Group by month
  let prevMonth = '';
  allDates.forEach(d => {
    const [y, mo, day] = d.split('-').map(Number);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (d === TODAY ? ' today-btn' : '') + (d === selectedDate ? ' active' : '');

    const dt = new Date(y, mo-1, day);
    const dayLabel = dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const weekday = dt.toLocaleDateString('en-US', { weekday:'short' });
    btn.textContent = (d === TODAY) ? `Today · ${dayLabel}` : `${weekday} ${dayLabel}`;

    btn.addEventListener('click', () => {
      selectedDate = d;
      renderDateNav();
      renderMain();
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
    nav.appendChild(btn);
  });

  // scroll to active
  setTimeout(() => {
    const active = nav.querySelector('.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 50);
}

// ════════════════════════════════════════════════════════
//  RENDER MATCH CARD
// ════════════════════════════════════════════════════════
function renderMatchCard(m, isNextUp) {
  const status = getMatchStatus(m);
  let cardCls = 'match-card';
  if (status === 'live') cardCls += ' live';
  else if (isNextUp && status === 'upcoming') cardCls += ' next-match';
  else if (status === 'done') cardCls += ' completed';

  let badgeHtml = '';
  if (m.stage !== 'Group Stage') {
    const sp = STAGE_PILL[m.stage];
    badgeHtml = `<div class="match-badge badge-ko">${sp.label || m.stage}</div>`;
  } else if (status === 'live') {
    badgeHtml = `<div class="match-badge badge-live">● LIVE</div>`;
  } else if (isNextUp && status === 'upcoming') {
    badgeHtml = `<div class="match-badge badge-next">Next Up</div>`;
  } else if (status === 'done') {
    badgeHtml = `<div class="match-badge badge-done">FT</div>`;
  }

  const timeDisplay = status === 'live'
    ? `<div class="match-time live-time">● LIVE</div>`
    : `<div class="match-time">${formatTime12(m.time)}</div>`;

  return `
    <div class="${cardCls}">
      <div class="team-block">
        <div class="team-flag">${m.homeFlag}</div>
        <div class="team-name">${m.home}</div>
      </div>
      <div class="match-center">
        ${timeDisplay}
        <div class="match-group">${m.group}</div>
        <div class="match-venue">${m.venue}</div>
        ${badgeHtml}
      </div>
      <div class="team-block right">
        <div class="team-flag">${m.awayFlag}</div>
        <div class="team-name">${m.away}</div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  TODAY HERO SECTION
// ════════════════════════════════════════════════════════
let countdownInterval = null;

function renderTodayHero(matches) {
  const now = new Date();
  const upcoming = matches.filter(m => getMatchStatus(m) === 'upcoming');
  const live = matches.filter(m => getMatchStatus(m) === 'live');

  if (upcoming.length === 0 && live.length === 0) return '';

  const nextMatch = live.length > 0 ? live[0] : upcoming[0];
  const nextStart = matchDatetimeET(nextMatch.date, nextMatch.time);

  const isLiveNow = live.length > 0;

  if (countdownInterval) clearInterval(countdownInterval);

  function updateCountdown() {
    const el = document.getElementById('countdown-display');
    if (!el) return;
    if (isLiveNow) {
      el.innerHTML = `<div class="countdown-num" style="color:var(--red)">LIVE</div><div class="countdown-label">In Progress</div>`;
      return;
    }
    const diff = nextStart - new Date();
    if (diff <= 0) {
      renderMain();
      return;
    }
    const { h, m, s } = fmtCountdown(diff);
    if (h > 0) {
      el.innerHTML = `<div class="countdown-num">${h}h ${m}m</div><div class="countdown-label">Starts In</div>`;
    } else {
      el.innerHTML = `<div class="countdown-num">${m}m ${s}s</div><div class="countdown-label">Starts In</div>`;
    }
  }

  setTimeout(() => {
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);
  }, 10);

  return `
    <div class="today-hero">
      <div class="today-hero-header">
        <div>
          <div class="today-label">Today's Matches</div>
          <div class="today-date-str">${formatFriendlyDate(TODAY)}</div>
        </div>
        <div style="text-align:right; color:var(--muted); font-size:0.78rem">
          ${matches.length} match${matches.length !== 1 ? 'es' : ''}<br>
          <span style="color:var(--green)">${upcoming.length} upcoming</span>
          ${live.length > 0 ? ` · <span style="color:var(--red)">${live.length} live</span>` : ''}
        </div>
      </div>
      <div class="next-up-card">
        <div>
          <div class="next-up-label">${isLiveNow ? '● Now Playing' : 'Next Kick-off'}</div>
          <div class="next-up-teams">${nextMatch.homeFlag} ${nextMatch.home}  vs  ${nextMatch.away} ${nextMatch.awayFlag}</div>
          <div class="next-up-meta">${formatTime12(nextMatch.time)} · ${nextMatch.venue}</div>
        </div>
        <div class="countdown-box" id="countdown-display">
          <div class="countdown-num">--:--</div>
          <div class="countdown-label">Starts In</div>
        </div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  RENDER MAIN
// ════════════════════════════════════════════════════════
function renderMain() {
  const main = document.getElementById('main-content');
  const dayMatches = SCHEDULE.filter(m => m.date === selectedDate);

  if (dayMatches.length === 0) {
    main.innerHTML = `<div class="no-matches">
      <div class="no-matches-icon">⚽</div>
      <h3>No Matches Today</h3>
      <p>Select another date to see the schedule.</p>
    </div>`;
    return;
  }

  // find next upcoming match for today
  const now = new Date();
  const upcomingToday = dayMatches.filter(m => getMatchStatus(m) === 'upcoming');
  const nextUp = upcomingToday[0] || null;

  // check live
  const hasLive = dayMatches.some(m => getMatchStatus(m) === 'live');
  document.getElementById('live-indicator').style.display = hasLive ? 'flex' : 'none';

  let html = '';

  // Today hero only on today's view
  if (selectedDate === TODAY) {
    html += renderTodayHero(dayMatches);
  } else {
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  }

  // Group by stage
  const stages = [...new Set(dayMatches.map(m => m.stage))];

  stages.forEach(stage => {
    const stageMatches = dayMatches.filter(m => m.stage === stage);
    const sp = STAGE_PILL[stage];

    if (sp && sp.label) {
      html += `<div class="round-header">
        <div class="round-pill ${sp.cls}">${sp.label}</div>
      </div>`;
    } else {
      html += `<div class="section-title">${stage}</div>`;
    }

    html += '<div class="matches-list">';
    stageMatches.forEach(m => {
      const isNextUp = nextUp && m === nextUp;
      html += renderMatchCard(m, isNextUp);
    });
    html += '</div>';
  });

  main.innerHTML = html;
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
renderDateNav();
renderMain();

// refresh every minute so statuses update
setInterval(() => {
  if (selectedDate === TODAY) renderMain();
}, 60000);
</script>
